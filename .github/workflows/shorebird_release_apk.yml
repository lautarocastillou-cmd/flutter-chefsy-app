name: Shorebird Base Release (APK)

on:
  workflow_dispatch:

jobs:
  release-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Generate local.properties for Android SDK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" >> android/local.properties
          cat android/local.properties

      - name: Get Dependencies
        run: |
          chmod +x android/gradlew
          flutter pub get

      - name: Shorebird Init (Crear app en la nube si no existe)
        run: |
          if [ ! -f shorebird.yaml ]; then
            shorebird init --force
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add shorebird.yaml
            git commit -m "chore: auto-generate shorebird.yaml via CI"
            git push
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Compilar APK Base con Shorebird
        run: |
          shorebird release android --artifact apk
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Subir APK para Descargar (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-base-shorebird
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publicar GitHub Release con la última APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Chefsy Cadete App (Última versión APK)"
          body: "APK oficial de Cadetería compilada automáticamente por GitHub Actions con Shorebird."
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir APK a Servidores Públicos de Chefsy (Supabase Storage)
        run: |
          curl -X POST "https://chefsy.app/api/cadeteria/subir-apk" \
            -H "Authorization: Bearer ${{ secrets.FLUTTER_SECRET_TOKEN || 'chefsy-flutter-secret-2026' }}" \
            -F "file=@build/app/outputs/flutter-apk/app-release.apk"
